# Render Blueprint — one-click deploy of the MyNewGame server (which also
# serves the client). In Render: New + > Blueprint > pick this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: mynewgame
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
