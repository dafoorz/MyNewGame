<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyNewGame — Co-op Boss Fight</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      background: #0d0d18;
      color: #cdd2e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      position: relative;
    }
    #game {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      touch-action: none;
      overflow: hidden;
    }
    #game canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto !important;
      height: auto !important;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <!-- Phaser 3 from CDN (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <!-- Socket.io client (only used by online mode; solo works without a server) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- Our game (ES modules) -->
  <script type="module" src="src/main.js?v=47"></script>
</body>
</html>
