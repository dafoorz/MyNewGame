<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyNewGame — Co-op Boss Fight</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0d0d18;
      color: #cdd2e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body, #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;
    }
    #game canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <!-- Phaser 3 from CDN (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <!-- Socket.io client (only used by online mode; solo works without a server) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <!-- Our game (ES modules) -->
  <script type="module" src="src/main.js?v=51"></script>
</body>
</html>
